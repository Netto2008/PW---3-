<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar Jogador</title>
    <link rel="stylesheet" href="../../styles/base.css">
    <link rel="stylesheet" href="./index.css">
</head>
<body>
    <div id="app">
        <div class="container">
            <h1>Adicionar Jogador</h1>
            
            <form id="form-jogador" class="form-jogador">
                <div class="form-group">
                    <label for="nome">Nome do Jogador:</label>
                    <input type="text" id="nome" name="nome" required placeholder="Ex: Neymar">
                </div>

                <div class="form-group">
                    <label for="camisa">Número da Camisa:</label>
                    <input type="number" id="camisa" name="camisa" required min="1" max="99" placeholder="Ex: 10">
                </div>

                <div class="form-group">
                    <label for="posicao">Posição:</label>
                    <select id="posicao" name="posicao" required>
                        <option value="">Selecione uma posição</option>
                        <option value="Goleiro">Goleiro</option>
                        <option value="Lateral">Lateral</option>
                        <option value="Zagueiro">Zagueiro</option>
                        <option value="Volante">Volante</option>
                        <option value="Meia">Meia</option>
                        <option value="Atacante">Atacante</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="gols">Gols:</label>
                    <input type="number" id="gols" name="gols" required min="0" value="0" placeholder="Ex: 5">
                </div>

                <div class="form-group checkbox">
                    <input type="checkbox" id="titular" name="titular">
                    <label for="titular">Jogador Titular</label>
                </div>

                <button type="submit" class="btn-submit">Adicionar Jogador</button>
            </form>

            <div id="mensagem" class="mensagem"></div>

            <div class="btns-navegacao">
                <a id="btn-voltar" href="../jogadores/index.html" class="btn-voltar">Voltar para Jogadores</a>
            </div>
        </div>
    </div>
    <script type="module" src="./index.js"></script>
</body>
</html>
